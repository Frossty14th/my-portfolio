version: '3.8'
services:
  portfolio-site:
    image: nginx
    ports:
      - "8080:80"
    volumes:
      - .:/usr/share/nginx/html
    restart: always

  management-ui:
    image: portainer/portainer-ce:latest
    ports:
      - "9443:9443"
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/var/data
    restart: always

volumes:
  portainer_data:
